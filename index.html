<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>坦克大战</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">HTML Tank Battle Deluxe</p>
      <h1>坦克大战升级版</h1>
      <p class="subtitle">支持基地防守和双人对战，加入多地形地图、随机补给和更强敌方 AI。</p>
    </section>

    <section class="control-bar">
      <button id="mode-classic" class="mode-button active" type="button">基地防守</button>
      <button id="mode-versus" class="mode-button" type="button">双人对战</button>
      <button id="restart" type="button">开始 / 重开</button>
    </section>

    <section class="board-wrap">
      <aside class="hud">
        <div class="card">
          <span class="label">模式</span>
          <strong id="mode-name">基地防守</strong>
        </div>
        <div class="card">
          <span class="label">关卡</span>
          <strong id="level-name">铁壁前线</strong>
        </div>
        <div class="card">
          <span class="label">敌军波次</span>
          <strong id="enemies">0</strong>
        </div>
        <div class="card">
          <span class="label">战场补给</span>
          <strong id="powerup">无</strong>
        </div>

        <div class="card player-card">
          <span class="label">P1</span>
          <strong id="p1-name">猎鹰</strong>
          <p id="p1-stats">生命 3 / 分数 0</p>
          <p>W A S D 移动，F 发射</p>
        </div>

        <div class="card player-card">
          <span class="label">P2</span>
          <strong id="p2-name">守望者</strong>
          <p id="p2-stats">生命 3 / 分数 0</p>
          <p>方向键移动，Enter 发射</p>
        </div>

        <div class="card legend">
          <span class="label">地形</span>
          <p>砖墙可摧毁，钢墙防弹，水面阻挡移动，草丛可隐藏。</p>
        </div>
      </aside>

      <div class="stage">
        <canvas id="game" width="832" height="832" aria-label="坦克大战游戏画布"></canvas>
        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <h2 id="overlay-title">准备进入战场</h2>
            <p id="overlay-text">选择模式后开始。基地防守需要顶住敌军波次；双人对战先击毁对手 5 次获胜。</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
